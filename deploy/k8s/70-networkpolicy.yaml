apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: shirods-controlplane
  namespace: shirods
spec:
  podSelector:
    matchLabels:
      app: shirods-controlplane
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 4222
        - protocol: TCP
          port: 2379
        - protocol: TCP
          port: 9042
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
