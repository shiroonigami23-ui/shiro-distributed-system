apiVersion: v1
kind: ConfigMap
metadata:
  name: shirods-config
  namespace: shirods
data:
  HTTP_ADDR: ":8080"
  HTTP_READ_TIMEOUT_MS: "10000"
  HTTP_READ_HEADER_TIMEOUT_MS: "3000"
  HTTP_WRITE_TIMEOUT_MS: "15000"
  HTTP_IDLE_TIMEOUT_MS: "60000"
  HTTP_SHUTDOWN_TIMEOUT_MS: "10000"
  HTTP_REQUEST_TIMEOUT_MS: "8000"
  MAX_CONCURRENT_REQUESTS: "500"
  MAX_CONCURRENT_PUBLISHES: "200"
  MAX_CONCURRENT_QUERIES: "300"
  CIRCUIT_FAILURE_THRESHOLD: "5"
  CIRCUIT_OPEN_MS: "15000"
  CIRCUIT_HALF_OPEN_SUCCESSES: "2"
  PUBLISH_TIMEOUT_MS: "5000"
  OUTBOX_LEASE_MS: "15000"
  OUTBOX_BACKOFF_BASE_MS: "500"
  OUTBOX_BACKOFF_MAX_MS: "30000"
  OUTBOX_BACKOFF_JITTER_PCT: "25"
  OUTBOX_QUARANTINE_AFTER: "12"
  CLEANUP_INTERVAL_MS: "30000"
  CLEANUP_BATCH_SIZE: "200"
  IDEMPOTENCY_TTL_HOURS: "336"
  DEAD_LETTER_TTL_HOURS: "720"
  SUBJECT_RATE_LIMIT_RPS: "100"
  SUBJECT_RATE_LIMIT_BURST: "200"
  SUBJECT_RATE_LIMIT_RPS_OVERRIDES: ""
  EVENT_TYPE_REGISTRY: ""
  REJECT_UNKNOWN_EVENT_TYPES: "false"
  EVENT_SCHEMA_VERSION_RULES: ""
  EVENT_SCHEMA_REQUIRED_FIELDS: ""
  MODULE_START_RETRY_MAX: "4"
  MODULE_START_RETRY_BACKOFF_MS: "1000"
  NATS_URL: "nats://nats:4222"
  NATS_STREAM: "SHIRO_EVENTS"
  ETCD_ENDPOINTS: "etcd:2379"
  LEADER_ELECTION_KEY: "/shirods/controlplane/leader"
  CASSANDRA_HOSTS: "cassandra:9042"
  CASSANDRA_KEYSPACE: "shirods"
  PUBLISH_RETRY_MAX: "4"
  PUBLISH_RETRY_BACKOFF_MS: "150"
  PUBLISH_RETRY_MAX_BACKOFF_MS: "3000"
  OUTBOX_RELAY_INTERVAL_MS: "1500"
  OUTBOX_RELAY_BATCH_SIZE: "100"
  RATE_LIMIT_RPS: "60"
  RATE_LIMIT_BURST: "120"
  RATE_LIMIT_MAX_IPS: "10000"
  RATE_LIMIT_IP_TTL_SECONDS: "900"
  MAX_REQUEST_BODY_BYTES: "1048576"
  SECURITY_HEADERS_ENABLED: "true"
  AUDIT_LOG_ENABLED: "true"
  REQUIRE_LEADER_FOR_WRITES: "false"
  OTEL_SERVICE_NAME: "shiro-distributed-system"
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  # TLS_* values can be provided when mTLS is enabled
  TLS_SERVER_NAME: ""
  TLS_INSECURE_SKIP_VERIFY: "false"
  CORS_ENABLED: "false"
  CORS_ALLOWED_ORIGINS: ""
  CORS_ALLOWED_METHODS: "GET,POST,OPTIONS"
  CORS_ALLOWED_HEADERS: "Authorization,Content-Type,Idempotency-Key,X-Request-Id"
  HSTS_ENABLED: "false"
  CSP_HEADER: "default-src 'none'; frame-ancestors 'none'; base-uri 'none'"
  API_TOKEN_EXPIRATIONS: ""
  AUTH_FAILURE_MAX_ATTEMPTS: "10"
  AUTH_FAILURE_BLOCK_SECONDS: "300"
