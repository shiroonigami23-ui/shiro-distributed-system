apiVersion: apps/v1
kind: Deployment
metadata:
  name: shirods-controlplane
  namespace: shirods
  labels:
    app: shirods-controlplane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shirods-controlplane
  template:
    metadata:
      labels:
        app: shirods-controlplane
    spec:
      containers:
        - name: controlplane
          image: ghcr.io/shiroonigami23-ui/shiro-distributed-system:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: shirods-config
            - secretRef:
                name: shirods-secrets
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          # Uncomment for mTLS material mounted from a secret:
          # volumeMounts:
          #   - name: tls-certs
          #     mountPath: /etc/shirods/tls
          #     readOnly: true
      # volumes:
      #   - name: tls-certs
      #     secret:
      #       secretName: shirods-tls
